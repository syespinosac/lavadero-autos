{% extends 'gestion/base.html' %}
{% block titulo %}Editar Tipo de Servicio{% endblock %}

{% block contenido %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>✏️ Editar Tipo de Servicio</h2>
    <a href="{% url 'lista_tipos_servicio' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left me-2"></i>Volver
    </a>
</div>

<div class="card border-0 shadow-sm" style="max-width: 600px;">
    <div class="card-body p-4">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-bold">Nombre del servicio</label>
                <input type="text" name="nombre" class="form-control"
                       value="{{ tipo.nombre }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Descripción</label>
                <textarea name="descripcion" class="form-control"
                          rows="3">{{ tipo.descripcion }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Precio</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" name="precio" class="form-control"
                           value="{{ tipo.precio }}" min="0" step="0.01" required>
                </div>
            </div>

            <div class="mb-3">
                <div class="form-check">
                    <input type="checkbox" name="activo" class="form-check-input"
                           id="activo" {% if tipo.activo %}checked{% endif %}>
                    <label class="form-check-label fw-bold" for="activo">
                        Servicio activo
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-warning w-100">
                <i class="bi bi-save me-2"></i>Actualizar Tipo de Servicio
            </button>
        </form>
    </div>
</div>
{% endblock %}
