{% extends 'gestion/base.html' %}
{% block titulo %}Nuevo Servicio{% endblock %}

{% block contenido %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>➕ Nuevo Servicio</h2>
    <a href="{% url 'lista_servicios' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left me-2"></i>Volver
    </a>
</div>

<div class="card border-0 shadow-sm" style="max-width: 600px;">
    <div class="card-body p-4">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-bold">Vehículo</label>
                <select name="vehiculo" class="form-select" required>
                    <option value="">Selecciona un vehículo...</option>
                    {% for vehiculo in vehiculos %}
                    <option value="{{ vehiculo.id }}">
                        {{ vehiculo.placa }} - {{ vehiculo.marca }} 
                        ({{ vehiculo.cliente.nombre }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Empleado</label>
                <select name="empleado" class="form-select" required>
                    <option value="">Selecciona un empleado...</option>
                    {% for empleado in empleados %}
                    <option value="{{ empleado.id }}">
                        {{ empleado.nombre }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Tipo de Servicio</label>
                <select name="tipo_servicio" class="form-select" required>
                    <option value="">Selecciona un servicio...</option>
                    {% for tipo in tipos %}
                    <option value="{{ tipo.id }}">
                        {{ tipo.nombre }} - ${{ tipo.precio }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Observaciones</label>
                <textarea name="observaciones" class="form-control" rows="3"
                          placeholder="Alguna observación adicional..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-save me-2"></i>Registrar Servicio
            </button>
        </form>
    </div>
</div>
{% endblock %}
