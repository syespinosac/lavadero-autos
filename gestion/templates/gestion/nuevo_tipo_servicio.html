{% extends 'gestion/base.html' %}
{% block titulo %}Nuevo Tipo de Servicio{% endblock %}

{% block contenido %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>➕ Nuevo Tipo de Servicio</h2>
    <a href="{% url 'lista_tipos_servicio' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left me-2"></i>Volver
    </a>
</div>

<div class="card border-0 shadow-sm" style="max-width: 600px;">
    <div class="card-body p-4">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-bold">Nombre del servicio</label>
                <input type="text" name="nombre" class="form-control"
                       placeholder="Ej: Lavado exterior, Pulido, Lavado integral"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3"
                          placeholder="Describe en qué consiste el servicio..."></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Precio</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" name="precio" class="form-control"
                           placeholder="Ej: 25000" min="0" step="0.01" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-save me-2"></i>Guardar Tipo de Servicio
            </button>
        </form>
    </div>
</div>
{% endblock %}
