<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>🚗 Lavadero - {% block titulo %}{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Iconos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e, #16213e);
            color: white;
            width: 250px;
        }
        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            border-radius: 8px;
            margin: 4px 8px;
            transition: all 0.3s;
        }
        .sidebar a:hover {
            background-color: #0f3460;
            color: white;
        }
        .sidebar .logo {
            padding: 24px 20px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            border-bottom: 1px solid #2d2d44;
            margin-bottom: 12px;
        }
        .main-content {
            flex: 1;
            padding: 30px;
        }
    </style>
</head>
<body>
<div class="d-flex">

    <!-- MENÚ LATERAL -->
    <div class="sidebar">
        <div class="logo">
            🚗 Lavadero
        </div>
        <a href="/"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
        <a href="/clientes/"><i class="bi bi-people me-2"></i> Clientes</a>
        <a href="/vehiculos/"><i class="bi bi-car-front me-2"></i> Vehículos</a>
        <a href="/tipos-servicio/"><i class="bi bi-list-check me-2"></i> Tipos de Servicio</a>
        <a href="/servicios/"><i class="bi bi-clipboard-check me-2"></i> Servicios</a>
        <a href="/empleados/"><i class="bi bi-person-badge me-2"></i> Empleados</a>
        <a href="/facturas/"><i class="bi bi-receipt me-2"></i> Facturas</a>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-content">
        {% block contenido %}
        {% endblock %}
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

{% if messages %}
<script>
{% for message in messages %}
var icon = "info";
var tag = "{{ message.tags }}";
if (tag === "success") icon = "success";
else if (tag === "error") icon = "error";
else if (tag === "warning") icon = "warning";

Swal.fire({
    icon: icon,
    title: "{{ message }}",
    showConfirmButton: false,
    timer: 2500,
    timerProgressBar: true,
    toast: true,
    position: "top-end"
});
{% endfor %}
</script>
{% endif %}

</body>
</html>
