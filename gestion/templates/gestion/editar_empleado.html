{% extends 'gestion/base.html' %}
{% block titulo %}Editar Empleado{% endblock %}

{% block contenido %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>✏️ Editar Empleado</h2>
    <a href="{% url 'lista_empleados' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left me-2"></i>Volver
    </a>
</div>

<div class="card border-0 shadow-sm" style="max-width: 600px;">
    <div class="card-body p-4">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-bold">Nombre completo</label>
                <input type="text" name="nombre" class="form-control"
                       value="{{ empleado.nombre }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Teléfono</label>
                <input type="text" name="telefono" class="form-control"
                       value="{{ empleado.telefono }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Porcentaje de Comisión (%)</label>
                <input type="number" name="porcentaje_comision" class="form-control"
                       value="{{ empleado.porcentaje_comision }}"
                       min="0" max="100" step="0.01" required>
            </div>

            <button type="submit" class="btn btn-warning w-100">
                <i class="bi bi-save me-2"></i>Actualizar Empleado
            </button>
        </form>
    </div>
</div>
{% endblock %}
